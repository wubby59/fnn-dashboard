<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="64" y="64" width="384" height="384" rx="80" ry="80" fill="url(#blueGradient)"/>

  <!-- N letter with lightning design -->
  <g fill="url(#navyGradient)">
    <!-- Left vertical bar of N -->
    <rect x="120" y="140" width="50" height="232" rx="5"/>

    <!-- Right vertical bar of N -->
    <rect x="342" y="140" width="50" height="232" rx="5"/>

    <!-- Lightning diagonal strokes -->
    <path d="M 150 160 L 220 160 L 180 256 L 240 256 L 170 372 L 200 280 L 150 280 Z" />
    <path d="M 280 140 L 360 140 L 360 200 L 320 260 L 360 260 L 360 372 L 310 280 L 340 230 L 280 230 Z" />
  </g>
</svg>
